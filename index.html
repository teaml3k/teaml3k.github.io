<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEAM L3K</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:black;
overflow:hidden;
}

/* VIDEO BACKGROUND */

#bgvideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* CENTER TEXT */

.welcome{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
font-size:80px;
font-weight:800;
letter-spacing:10px;
text-align:center;
}

/* HEADER */

header{
position:fixed;
top:25px;
left:25px;
right:25px;
display:flex;
justify-content:space-between;
z-index:20;
}

.menu-btn{
font-size:32px;
cursor:pointer;
color:white;
}

.apply-btn{
background:white;
color:black;
border:none;
padding:10px 18px;
font-weight:bold;
cursor:pointer;
}

/* HAMBURGER MENU */

#menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:black;
padding-top:80px;
transition:0.35s;
z-index:15;
}

#menu a{
display:block;
padding:18px;
color:white;
text-decoration:none;
}

#menu a:hover{
background:#222;
}

/* APPLICATION MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
justify-content:center;
align-items:center;
z-index:30;
}

.modal-box{
background:#111;
padding:30px;
width:360px;
max-width:360px;
color:white;
}

/* FORM INPUT */

.modal-box input,
.modal-box select,
.modal-box textarea{

width:100%;
padding:10px;
margin-bottom:12px;
background:#222;
border:none;
color:white;
resize:none;

}

.modal-box textarea{
height:80px;
resize:none;
}

.modal-box button{
width:100%;
padding:12px;
background:white;
color:black;
border:none;
font-weight:bold;
cursor:pointer;
}

.close{
float:right;
cursor:pointer;
font-size:22px;
}

</style>
</head>

<body>

<!-- VIDEO -->

<video autoplay muted loop playsinline id="bgvideo">
<source src="l3k-video.mp4" type="video/mp4">
</video>

<!-- HEADER -->

<header>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<button class="apply-btn" onclick="openApply()">Apply</button>

</header>

<!-- MENU -->

<nav id="menu">

<a href="bk-cho.html" onclick="toggleMenu()">BK CHO</a>
<a href="l3k-studio.html" onclick="toggleMenu()">L3K Studio</a>
<a href="store.html" onclick="toggleMenu()">Store</a>
<a href="artist.html" onclick="toggleMenu()">Artist</a>
<a href="https://www.jkosmec.com/" target="_blank">JKOSMEC</a>

</nav>

<!-- CENTER TEXT -->

<div class="welcome">
WELCOME
</div>

<!-- APPLY MODAL -->

<div id="applyModal" class="modal">

<div class="modal-box">

<span class="close" onclick="closeApply()">×</span>

<h2>L3K CREW APPLICATION</h2>

<form action="https://formspree.io/f/mkoqrdjd" method="POST">

<input type="text" name="name" placeholder="Name" required>

<input type="number" name="birth_year" placeholder="Birth Year (2008-2011)" required>

<select name="gender" required>
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input type="tel" name="phone" placeholder="Phone Number" required>

<input type="tel" name="guardian_phone" placeholder="Guardian Phone Number" required>

<input type="text" name="experience" placeholder="Experience (optional)">

<textarea name="reason" placeholder="Reason for Applying"></textarea>

<label style="font-size:12px">

<input type="checkbox" required>
I agree to the collection of personal information.

</label>

<input type="hidden" name="_next" value="https://teaml3k.github.io/thanks.html">

<button type="submit">Submit</button>

</form>

</div>

</div>

<script>

/* MENU CONTROL */

let menu = document.getElementById("menu")

function toggleMenu(){

if(menu.style.left==="0px"){
menu.style.left="-260px"
}else{
menu.style.left="0px"
}

}

/* CLICK OUTSIDE CLOSE */

document.addEventListener("click",function(e){

if(!menu.contains(e.target) && !e.target.classList.contains("menu-btn")){
menu.style.left="-260px"
}

})

/* APPLY MODAL */

function openApply(){
document.getElementById("applyModal").style.display="flex"
}

function closeApply(){
document.getElementById("applyModal").style.display="none"
}

</script>

</body>
</html>
