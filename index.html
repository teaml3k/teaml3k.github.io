<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio L3K</title>

<style>
body{
margin:0;
background:#cfc9bb;
font-family:Arial;
overflow:hidden;
}

/* fade animation */
.main img{
animation:fade 1.2s ease;
}

@keyframes fade{
0%{opacity:0; transform:scale(1.03);}
100%{opacity:1;}
}

/* top nav */
header{
position:fixed;
top:25px;
left:25px;
right:25px;
display:flex;
justify-content:space-between;
z-index:10;
}

.menu-btn{
font-size:32px;
cursor:pointer;
color:black;
}

.apply-btn{
background:black;
color:white;
border:none;
padding:10px 18px;
font-weight:bold;
cursor:pointer;
transition:0.25s;
}

.apply-btn:hover{
background:#333;
}

/* menu */
#menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:black;
padding-top:90px;
transition:0.35s;
z-index:9;
}

#menu a{
display:block;
padding:18px;
color:white;
text-decoration:none;
transition:0.2s;
}

#menu a:hover{
background:#222;
padding-left:25px;
}

/* main */
.main{
position:relative;
width:100vw;
height:100vh;
}

.main img{
width:100%;
height:100%;
object-fit:contain;
}

/* clickable zones */
.link{
position:absolute;
cursor:pointer;
transition:0.25s;
}

.link:hover{
transform:scale(1.05);
}

/* zones (can adjust later) */

.l3kstudio{
bottom:95px;
left:90px;
width:300px;
height:170px;
}

.l3kfilm{
bottom:110px;
left:610px;
width:260px;
height:150px;
}

.youtube{
bottom:120px;
left:820px;
width:120px;
height:110px;
}

.applemusic{
bottom:115px;
right:520px;
width:120px;
height:110px;
}

.musicstudio{
bottom:95px;
right:310px;
width:480px;
height:170px;
}

.arrow{
bottom:115px;
right:140px;
width:120px;
height:120px;
}

/* modal */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:20;
}

.modal-box{
background:#111;
padding:30px;
width:360px;
color:white;
animation:popup 0.25s ease;
}

@keyframes popup{
0%{transform:scale(0.9); opacity:0;}
100%{transform:scale(1);}
}

.modal-box input,
.modal-box select,
.modal-box textarea{
width:100%;
padding:10px;
margin-bottom:12px;
background:#222;
border:none;
color:white;
}

.modal-box textarea{
height:80px;
}

.modal-box button{
width:100%;
padding:12px;
background:white;
color:black;
border:none;
font-weight:bold;
cursor:pointer;
}

.close{
float:right;
cursor:pointer;
font-size:22px;
}

</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
<button class="apply-btn" onclick="openApply()">Apply</button>
</header>

<nav id="menu">
<a href="bk-cho.html">BK CHO</a>
<a href="l3k-studio.html">L3K Studio</a>
<a href="store.html">Store</a>
<a href="artist.html">Artist</a>
<a href="https://www.jkosmec.com/" target="_blank">JKOSMEC</a>
</nav>

<div class="main">
<img src="l3k-main.png">

<a class="link l3kstudio" href="l3k-studio.html"></a>
<a class="link l3kfilm" href="#"></a>
<a class="link youtube" href="https://youtube.com" target="_blank"></a>
<a class="link musicstudio" href="#"></a>
<a class="link applemusic" href="https://music.apple.com" target="_blank"></a>
<a class="link arrow" href="l3k-studio.html"></a>

</div>

<div id="applyModal" class="modal">
<div class="modal-box">

<span class="close" onclick="closeApply()">×</span>

<h2>L3K CREW APPLICATION</h2>

<form action="https://formspree.io/f/mkoqrdjd" method="POST">

<input type="text" name="name" placeholder="Name" required>
<input type="number" name="birth_year" placeholder="Birth Year" required>

<select name="gender" required>
<option value="">Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input type="tel" name="phone" placeholder="Phone Number" required>
<input type="tel" name="guardian_phone" placeholder="Guardian Phone Number" required>

<input type="text" name="experience" placeholder="Experience">
<textarea name="reason" placeholder="Reason for Applying"></textarea>

<label style="font-size:12px">
<input type="checkbox" required>
I agree to the collection of personal information
</label>

<input type="hidden" name="_next" value="https://teaml3k.github.io/thanks.html">

<button type="submit">Submit</button>

</form>

</div>
</div>

<script>
function toggleMenu(){
let menu=document.getElementById("menu")
if(menu.style.left==="0px"){
menu.style.left="-260px"
}else{
menu.style.left="0px"
}
}

function openApply(){
document.getElementById("applyModal").style.display="flex"
}

function closeApply(){
document.getElementById("applyModal").style.display="none"
}
</script>

</body>
</html>
