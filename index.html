<!DOCTYPE html>
<html lang="en">

<head> 

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Studio L3K</title>

<style>

body{
margin:0;
font-family:Arial;
overflow:hidden;
background:black;
}

/* 영상 배경 */

#bgvideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* 상단 UI */

header{
position:fixed;
top:25px;
left:25px;
right:25px;
display:flex;
justify-content:space-between;
z-index:20;
}

.menu-btn{
font-size:32px;
cursor:pointer;
color:white;
}

.apply-btn{
background:white;
color:black;
border:none;
padding:10px 18px;
font-weight:bold;
cursor:pointer;
}

/* 햄버거 메뉴 */

#menu{
position:fixed;
top:0;
left:-260px;
width:260px;
height:100%;
background:black;
padding-top:80px;
transition:0.35s;
z-index:15;
}

#menu a{
display:block;
padding:18px;
color:white;
text-decoration:none;
}

#menu a:hover{
background:#222;
}

/* 클릭 영역 */

.link{
position:absolute;
cursor:pointer;
}

/* 영역 위치 (필요하면 조정) */

.l3kstudio{
bottom:95px;
left:90px;
width:300px;
height:170px;
}

.l3kfilm{
bottom:110px;
left:610px;
width:260px;
height:150px;
}

.youtube{
bottom:120px;
left:820px;
width:120px;
height:110px;
}

.applemusic{
bottom:115px;
right:520px;
width:120px;
height:110px;
}

.musicstudio{
bottom:95px;
right:310px;
width:480px;
height:170px;
}

.arrow{
bottom:115px;
right:140px;
width:120px;
height:120px;
}

/* 지원 팝업 */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
z-index:30;
}

.modal-box{
background:#111;
padding:30px;
width:360px;
color:white;
}

.modal-box input,
.modal-box select,
.modal-box textarea{

width:100%;
padding:10px;
margin-bottom:12px;
background:#222;
border:none;
color:white;
}

.modal-box textarea{
height:80px;
}

.modal-box button{
width:100%;
padding:12px;
background:white;
color:black;
border:none;
font-weight:bold;
cursor:pointer;
}

.close{
float:right;
cursor:pointer;
font-size:22px;
}

/* 사운드 버튼 */

#soundToggle{
position:fixed;
bottom:20px;
left:20px;
z-index:20;
padding:8px 14px;
background:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<!-- 영상 배경 -->

<video autoplay muted loop playsinline id="bgvideo">
<source src="l3k-video.mp4" type="video/mp4">
</video>

<header>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<button class="apply-btn" onclick="openApply()">Apply</button>

</header>

<nav id="menu">

<a href="bk-cho.html" onclick="toggleMenu()">BK CHO</a>
<a href="l3k-studio.html" onclick="toggleMenu()">L3K Studio</a>
<a href="store.html" onclick="toggleMenu()">Store</a>
<a href="artist.html" onclick="toggleMenu()">Artist</a>
<a href="https://www.jkosmec.com/" target="_blank">JKOSMEC</a>

</nav>

<!-- 클릭 영역 -->

<a class="link l3kstudio" href="l3k-studio.html"></a>

<a class="link l3kfilm" href="l3k-film.html"></a>

<a class="link youtube" href="https://youtube.com" target="_blank"></a>

<a class="link musicstudio" href="musicstudio.html"></a>

<a class="link applemusic" href="https://music.apple.com" target="_blank"></a>

<a class="link arrow" href="l3k-studio.html"></a>

<!-- 지원 팝업 -->

<div id="applyModal" class="modal">

<div class="modal-box">

<span class="close" onclick="closeApply()">×</span>

<h2>L3K CREW APPLICATION</h2>

<form action="https://formspree.io/f/mkoqrdjd" method="POST">

<input type="text" name="name" placeholder="Name" required>

<input type="number" name="birth_year" placeholder="Birth Year" required>

<select name="gender" required>

<option value="">Gender</option>
<option>Male</option>
<option>Female</option>

</select>

<input type="tel" name="phone" placeholder="Phone Number" required>

<input type="tel" name="guardian_phone" placeholder="Guardian Phone Number" required>

<input type="text" name="experience" placeholder="Experience">

<textarea name="reason" placeholder="Reason for Applying"></textarea>

<label style="font-size:12px">

<input type="checkbox" required>
I agree to the collection of personal information

</label>

<input type="hidden" name="_next" value="https://teaml3k.github.io/thanks.html">

<button type="submit">Submit</button>

</form>

</div>

</div>

<button id="soundToggle">Sound</button>

<script>

/* 햄버거 메뉴 */

let menu = document.getElementById("menu")

function toggleMenu(){

if(menu.style.left==="0px"){
menu.style.left="-260px"
}else{
menu.style.left="0px"
}

}

/* 화면 클릭시 메뉴 닫기 */

document.addEventListener("click", function(e){

if(!menu.contains(e.target) && !e.target.classList.contains("menu-btn")){
menu.style.left="-260px"
}

})

/* 지원 팝업 */

function openApply(){
document.getElementById("applyModal").style.display="flex"
}

function closeApply(){
document.getElementById("applyModal").style.display="none"
}

/* 영상 사운드 */

const video = document.getElementById("bgvideo")
const btn = document.getElementById("soundToggle")

btn.onclick = function(){

video.muted = !video.muted

if(video.muted){
btn.innerText="Sound"
}else{
btn.innerText="Mute"
}

}

</script>

</body>
</html>
