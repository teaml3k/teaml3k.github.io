<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L3K 메인페이지</title>
<style>
  /* 기본 스타일 */
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    font-family: 'Arial', sans-serif;
    overflow-x: hidden;
  }

  /* 배경 영상 */
  .video-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
  }

  /* 로고 */
  .logo {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 150px;
    z-index: 10;
  }

  /* 햄버거 메뉴 버튼 */
  .menu-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
    z-index: 10;
    width: 30px;
    height: 25px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .menu-btn div {
    width: 100%;
    height: 4px;
    background-color: white;
  }

  /* 메뉴 패널 */
  .menu {
    position: fixed;
    top: 0;
    right: -250px;
    width: 250px;
    height: 100%;
    background-color: rgba(0,0,0,0.9);
    color: white;
    transition: right 0.3s ease;
    padding: 50px 20px;
    z-index: 9;
  }
  .menu.open {
    right: 0;
  }

  .menu a {
    display: block;
    margin: 20px 0;
    color: white;
    text-decoration: none;
  }

  /* 음악 버튼 */
  .music-toggle {
    position: absolute;
    bottom: 20px;
    left: 20px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 10px 15px;
    cursor: pointer;
  }
</style>
</head>
<body>

<!-- 배경 영상 -->
<video class="video-bg" autoplay loop muted>
  <source src="background.mp4" type="video/mp4">
</video>

<!-- 배경 음악 -->
<audio class="bg-music" autoplay loop>
  <source src="bgmusic.mp3" type="audio/mpeg">
</audio>

<!-- 로고 -->
<img src="logo.png" alt="L3K 로고" class="logo">

<!-- 햄버거 메뉴 버튼 -->
<div class="menu-btn" id="menuBtn">
  <div></div>
  <div></div>
  <div></div>
</div>

<!-- 메뉴 패널 -->
<div class="menu" id="menuPanel">
  <a href="#">홈</a>
  <a href="#">제품</a>
  <a href="#">영상</a>
  <a href="#">문의</a>
</div>

<!-- 음악 제어 버튼 -->
<button class="music-toggle" id="musicToggle">음악 켜기/끄기</button>

<script>
  // 햄버거 메뉴 열기/닫기
  const menuBtn = document.getElementById('menuBtn');
  const menuPanel = document.getElementById('menuPanel');
  menuBtn.addEventListener('click', () => {
    menuPanel.classList.toggle('open');
  });

  // 배경 음악 제어
  const music = document.querySelector('.bg-music');
  const musicToggle = document.getElementById('musicToggle');
  music.volume = 0.5; // 기본 볼륨
  musicToggle.addEventListener('click', () => {
    if (music.paused) music.play();
    else music.pause();
  });
</script>

</body>
</html>
